# gitleaks configuration — suppress test-fixture false positives only.
# Verified locally with `gitleaks detect --source . --no-git` before adding;
# both findings are synthetic test data, not real credentials:
#   - skills/setup-harness/tests/harness-hooks.bats:82 — fake ghp_… PAT used
#     to exercise the gh-auth-preflight hook (placeholder value, not real token)
#   - tests/fixtures/contracts/sample_contract.json:4 — hex idempotency_token
