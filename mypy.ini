[mypy]
strict = True
files = scripts, hooks, vault/pipeline/canvas.py
explicit_package_bases = True
mypy_path = scripts
ignore_missing_imports = True

[mypy-_log]
disallow_untyped_decorators = False

[mypy-_prompts]
disallow_untyped_decorators = False

[mypy-_config]
disallow_untyped_decorators = False
