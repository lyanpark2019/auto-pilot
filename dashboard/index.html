<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>auto-pilot — unified plugin scorecard</title>
<style>
  :root { --bg:#0d1117; --panel:#161b22; --line:#30363d; --txt:#e6edf3; --dim:#8b949e;
          --core:#3fb950; --keep:#8b949e; --integrate:#58a6ff; --remove:#f85149; --pending:#d29922; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt); font:14px/1.45 -apple-system,'SF Pro',Segoe UI,sans-serif; padding:24px; }
  h1 { font-size:20px; margin:0 0 4px; } .sub { color:var(--dim); font-size:12px; margin-bottom:16px; }
  .summary { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:18px; }
  .stat { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:10px 14px; min-width:110px; }
  .stat b { display:block; font-size:20px; } .stat span { color:var(--dim); font-size:11px; }
  .rounds { margin-bottom:14px; } .rounds button { background:var(--panel); color:var(--txt); border:1px solid var(--line);
    border-radius:6px; padding:5px 12px; margin-right:6px; cursor:pointer; font-size:12px; }
  .rounds button.on { border-color:var(--integrate); color:var(--integrate); }
  .legend { font-size:11px; color:var(--dim); margin-bottom:18px; }
  .dot { display:inline-block; width:9px; height:9px; border-radius:50%; margin:0 4px 0 12px; }
  .subsystem { margin-bottom:22px; }
  .subsystem h2 { font-size:13px; text-transform:uppercase; letter-spacing:.08em; color:var(--dim);
    border-bottom:1px solid var(--line); padding-bottom:6px; margin:0 0 10px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:8px; }
  .card { background:var(--panel); border:1px solid var(--line); border-left:3px solid var(--keep);
    border-radius:7px; padding:8px 10px; }
  .card .top { display:flex; justify-content:space-between; align-items:baseline; gap:8px; }
  .name { font-weight:600; font-size:13px; word-break:break-all; }
  .type { font-size:10px; color:var(--dim); border:1px solid var(--line); border-radius:4px; padding:1px 5px; white-space:nowrap; }
  .scorebar { height:5px; background:var(--line); border-radius:3px; margin:7px 0 5px; overflow:hidden; }
  .scorebar i { display:block; height:100%; border-radius:3px; }
  .meta { display:flex; justify-content:space-between; font-size:11px; color:var(--dim); }
  .delta-up { color:var(--core); } .delta-down { color:var(--remove); }
  .note { font-size:11px; color:var(--dim); margin-top:4px; }
  .verdict { font-size:10px; font-weight:700; letter-spacing:.05em; }
  details.dims { margin-top:5px; font-size:11px; color:var(--dim); }
  details.dims summary { cursor:pointer; }
</style>
</head>
<body>
<h1>auto-pilot — unified AI coding system scorecard</h1>
<div class="sub" id="sub"></div>
<div class="summary" id="summary"></div>
<div class="rounds" id="rounds"></div>
<div class="legend">
  verdict: <span class="dot" style="background:var(--core)"></span>CORE
  <span class="dot" style="background:var(--integrate)"></span>INTEGRATE(병합처)
  <span class="dot" style="background:var(--keep)"></span>KEEP
  <span class="dot" style="background:var(--remove)"></span>REMOVE
  <span class="dot" style="background:var(--pending)"></span>PENDING — 점수 = core_fit·40% + uniqueness·25% + evidence·20% + cost(저부담)·15%
</div>
<div id="tree"></div>
<script src="data.js"></script>
<script>
const D = window.DASHBOARD_DATA || {assets:[],rounds:[]};
const VCOLOR = {CORE:'var(--core)',INTEGRATE:'var(--integrate)',KEEP:'var(--keep)',REMOVE:'var(--remove)',PENDING:'var(--pending)'};
let cur = D.rounds.length - 1;

function score(roundIdx, key) {
  const r = D.rounds[roundIdx]; if (!r) return null;
  return r.assets[key] || null;
}
function render() {
  const r = D.rounds[cur];
  document.getElementById('sub').textContent =
    `branch ${D.branch} @ ${D.commit} — round ${r ? r.round : '—'} (${r ? r.label : 'no scores yet'})`;
  // round buttons
  document.getElementById('rounds').innerHTML = D.rounds.map((x,i) =>
    `<button class="${i===cur?'on':''}" onclick="cur=${i};render()">R${x.round}</button>`).join('') || '';
  // summary
  const counts = {CORE:0,INTEGRATE:0,KEEP:0,REMOVE:0,PENDING:0,UNSCORED:0};
  let sum=0, n=0;
  D.assets.forEach(a => {
    const s = score(cur, a.type.replace('skill-shell','skill-shell')+':'+a.name) || score(cur,'skill:'+a.name);
    if (s) { counts[s.verdict]=(counts[s.verdict]||0)+1; sum+=s.total; n++; } else counts.UNSCORED++;
  });
  const prev = cur>0 ? D.rounds[cur-1] : null;
  let prevAvg = null;
  if (prev) { let ps=0,pn=0; Object.values(prev.assets).forEach(s=>{ps+=s.total;pn++;}); prevAvg=pn?ps/pn:null; }
  const avg = n? (sum/n) : 0;
  const deltaTxt = prevAvg!=null ? ` <span class="${avg>=prevAvg?'delta-up':'delta-down'}">(${avg>=prevAvg?'+':''}${(avg-prevAvg).toFixed(1)} vs R${prev.round})</span>` : '';
  document.getElementById('summary').innerHTML =
    `<div class="stat"><b>${D.assets.length}</b><span>assets in tree</span></div>` +
    `<div class="stat"><b>${avg.toFixed(1)}${deltaTxt}</b><span>avg weighted score</span></div>` +
    Object.entries(counts).filter(([,v])=>v).map(([k,v]) =>
      `<div class="stat" style="border-left:3px solid ${VCOLOR[k]||'var(--line)'}"><b>${v}</b><span>${k}</span></div>`).join('');
  // tree
  const bySub = {};
  D.assets.forEach(a => { (bySub[a.subsystem] = bySub[a.subsystem] || []).push(a); });
  const order = ['docs-core','docs-vault-export','core-loop','review','quality','harness','swarm','deploy','conductor','diagnostics','goal','other'];
  document.getElementById('tree').innerHTML = order.filter(s=>bySub[s]).map(sub => {
    const cards = bySub[sub].map(a => {
      const key = a.type+':'+a.name;
      const s = score(cur,key);
      const p = cur>0 ? score(cur-1,key) : null;
      const v = s ? s.verdict : 'UNSCORED';
      const col = VCOLOR[v] || 'var(--line)';
      const delta = (s&&p) ? (s.total-p.total) : null;
      const dHtml = delta!=null && delta!==0 ? `<span class="${delta>0?'delta-up':'delta-down'}">${delta>0?'▲':'▼'}${Math.abs(delta).toFixed(1)}</span>` : '';
      return `<div class="card" style="border-left-color:${col}">
        <div class="top"><span class="name">${a.name}</span><span class="type">${a.type}</span></div>
        <div class="scorebar"><i style="width:${s?s.total*10:0}%;background:${col}"></i></div>
        <div class="meta"><span class="verdict" style="color:${col}">${v}</span><span>${s?s.total.toFixed(1):'—'}/10 ${dHtml}</span></div>
        ${s&&s.note?`<div class="note">${s.note}</div>`:''}
        ${s?`<details class="dims"><summary>dims</summary>fit ${s.core_fit} · uniq ${s.uniqueness} · evid ${s.evidence} · cost ${s.cost}</details>`:''}
      </div>`;
    }).join('');
    return `<div class="subsystem"><h2>${sub} (${bySub[sub].length})</h2><div class="grid">${cards}</div></div>`;
  }).join('');
}
render();
</script>
</body>
</html>
