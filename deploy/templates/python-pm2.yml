# Template: Python + PM2 (git-based deploy)
# Projects: naver_blog, sportic365-api

name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target_sha:
        description: "Deploy commit SHA (leave empty for branch HEAD)"
        required: false
        default: ""

concurrency:
  group: __PROJECT_NAME__-${{ github.ref }}
  cancel-in-progress: true

env:
  DEPLOY_SHA: ${{ github.event.inputs.target_sha || github.sha }}

jobs:
  deploy:
    name: Deploy to __ENV_NAME__
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.1.0
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          TARGET_SHA: ${{ env.DEPLOY_SHA }}
          REPO_PATH: ${{ github.repository }}
          # __ENV_SECRETS__
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          timeout: 120s
          envs: GH_TOKEN,TARGET_SHA,REPO_PATH
          script: |
            set -euo pipefail

            APP_DIR="$HOME/__APP_DIR_NAME__"
            REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${REPO_PATH}.git"
            CLEAN_REPO_URL="https://github.com/${REPO_PATH}.git"

            cleanup_remote() {
              if [ -d "$APP_DIR/.git" ]; then
                git -C "$APP_DIR" remote set-url origin "$CLEAN_REPO_URL" || true
              fi
            }
            trap 'cleanup_remote' EXIT

            git config --global init.defaultBranch main
            git config --global advice.detachedHead false

            if [ -d "$APP_DIR/.git" ]; then
              cd "$APP_DIR"
              git remote set-url origin "$REPO_URL"
              git fetch origin main
            else
              git clone --branch main --single-branch "$REPO_URL" "$APP_DIR"
              cd "$APP_DIR"
            fi

            git checkout -B main origin/main
            git checkout "$TARGET_SHA"

            if [ ! -d ".venv" ]; then
              python3 -m venv .venv
            fi
            .venv/bin/pip install --upgrade pip -q
            .venv/bin/pip install -r requirements.txt -q

            mkdir -p logs

            # __ENV_FILE__: replace with .env heredoc + sed -i 's/^[[:space:]]*//' .env

            PM2_APP="__PM2_APP_NAME__"
            if pm2 describe "$PM2_APP" >/dev/null 2>&1; then
              pm2 restart "$PM2_APP" --update-env
            else
              pm2 start ecosystem.config.js
            fi
            pm2 save

            DEPLOY_DIR="$APP_DIR/.deploy"
            mkdir -p "$DEPLOY_DIR"
            echo "$TARGET_SHA" > "$DEPLOY_DIR/last_good_commit"
            echo "$(date -u +%Y-%m-%dT%H:%M:%S%z) | ci | ${TARGET_SHA:0:7} | __ENV_LABEL__ | main | SUCCESS" >> "$DEPLOY_DIR/deploy.log"

            pm2 status
            echo "Deployment complete!"
