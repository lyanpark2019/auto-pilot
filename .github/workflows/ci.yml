name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: python gates (ruff + mypy + pytest + bench + prompt-regression)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: ruff
        run: python -m ruff check scripts/ tests/

      - name: mypy --strict
        run: python -m mypy scripts/

      - name: pytest (suite + prompt regression)
        run: python -m pytest tests/ -q

      - name: pytest-benchmark (perf budget + baseline gate)
        run: python -m pytest tests/test_perf.py --benchmark-only -v

  bash:
    name: bash gates (shellcheck)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4

      - name: install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: shellcheck
        run: shellcheck hooks/*.sh

  manifest:
    name: plugin manifest sanity
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - uses: actions/checkout@v4

      - name: validate plugin.json + hooks.json
        run: |
          python -c "import json; json.load(open('.claude-plugin/plugin.json'))"
          python -c "import json; json.load(open('.claude-plugin/marketplace.json'))"
          python -c "import json; json.load(open('hooks/hooks.json'))"

      - name: validate prompt fixture JSON
        run: |
          for f in prompts/fixtures/*.json; do
            python -c "import json,sys; json.load(open('$f'))" || exit 1
          done
