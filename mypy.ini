[mypy]
strict = True
files = scripts, hooks, vault/pipeline/canvas.py, vault/sources/code.py, vault/sources/_excludes.py, vault/pipeline/bases.py, vault/pipeline/scan_code.py, vault/pipeline/state.py, vault/pipeline/scan_docs.py, vault/scripts/lockfile.py, vault/pipeline/dispatch.py, vault/pipeline/loop.py, vault/pipeline/self_improve.py
explicit_package_bases = True
mypy_path = scripts
ignore_missing_imports = True

[mypy-_log]
disallow_untyped_decorators = False

[mypy-_prompts]
disallow_untyped_decorators = False

[mypy-_config]
disallow_untyped_decorators = False
