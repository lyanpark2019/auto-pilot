name: learning-loop-review
description: |
  Learning-loop → Archon PoC. The ONE capability Archon categorically lacks for the
  autonomous case: durable cross-run defect memory. A bash INJECT node renders a
  SANITIZED class-level nudge from auto-pilot's filesystem ledger; ONE pinned Claude
  reviewer (fresh context) sees the diff + the nudge; a bash CAPTURE+MINE node feeds the
  reviewer's REJECT findings back into that same durable ledger so a later, structurally
  related diff inherits the memory.
  This workflow is the MEMORY axis of an A/B (ON vs OFF). The driver runs the OFF arm by
  inlining AUTO_PILOT_DISABLE_LEARNINGS=1 on the inject node's resolve-learnings command
  ONLY (see the OFF-ARM NOTE on that node) — never as a subprocess-wide env, which would
  leak into the Claude provider and break "arms differ in exactly one bit".
  Use when: "learning-loop A/B", "cross-run defect memory", "durable ledger review".

provider: claude

# CRITICAL (spec Task 9 + codex P1-4): the ledger slug embeds the ABSOLUTE repo/worktree
# path (auto-pilot _improvement.py:98,122). Archon CLI defaults to a timestamped worktree
# (workflow.ts:513,717,780) → each run would resolve a DIFFERENT slug → the durable ledger
# would diverge and distinct_runs would never accumulate. Pinning worktree.enabled:false
# keeps every run on the same canonical checkout so the slug — and thus the ledger dir — is
# stable across runs. The inject/mine nodes ALSO pass an explicit stable --repo-root and a
# pinned --ledger-dir so durability never relies on cwd alone.
worktree:
  enabled: false
mutates_checkout: false
tags: [review, poc, learning-loop, memory]

# NO persist_sessions here (and the reviewer pins context: fresh) — opt-in provider-session
# resume (workflow.ts:89, dag-executor.ts:3323) must be OFF so the A/B arms differ in exactly
# one bit. The driver asserts no node_session_resumed event in either arm.
#
# $WORKFLOW_ID is per-run TEXT substitution (executor-shared.ts:441). It is used for LOGGING
# ONLY below — NEVER as a learning-miner run_id (it would inflate distinct_runs on same-diff
# re-runs). The real run_id derives from the reviewed work unit via run_id_from_diff.sh.

nodes:
  - id: capture-diff
    bash: |
      set -euo pipefail
      # Freeze the reviewed work unit's diff to a stable artifact. Cloned from
      # xmodel-adversarial-review.yaml:17-25 (proven).
      DIFF=$(git diff HEAD || true)
      if [ -z "$DIFF" ]; then DIFF=$(git show --no-color --format=fuller HEAD || true); fi
      printf '%s\n' "$DIFF" > "$ARTIFACTS_DIR/diff.patch"
      BYTES=$(wc -c < "$ARTIFACTS_DIR/diff.patch" | tr -d ' ')
      echo "[$WORKFLOW_ID] capture-diff: ${BYTES} bytes" >&2
      printf '{"bytes": %s}\n' "$BYTES"
    timeout: 30000

  - id: inject
    depends_on: [capture-diff]
    bash: |
      set -euo pipefail
      # INJECT phase. Render the SANITIZED class-level nudge from the DURABLE ledger into
      # the context bundle the reviewer reads. --sanitized strips title/evidence/file/
      # line/run-id/snippet (anti-spoiler, codex P0-1); --ledger-dir pins the durable path
      # (codex P1-5); --repo-root is the stable canonical checkout (codex P1-4).
      #
      # ----------------------------------------------------------------------------------
      # OFF-ARM NOTE (codex confirm P1, the experiment-killer guard):
      #   For the OFF / memory-disabled arm, the A/B driver REWRITES this command so the
      #   resolve-learnings invocation is prefixed INLINE with the disable flag:
      #
      #       AUTO_PILOT_DISABLE_LEARNINGS=1 python3 .../orchestrator.py resolve-learnings ...
      #
      #   The prefix MUST be inline on THIS command string only. It must NOT be exported as
      #   a subprocess-wide env on the Archon CLI process: the Claude provider copies
      #   process.env (claude/provider.ts:88,865), so a process-wide OFF env would also reach
      #   the reviewer node and break "arms differ in exactly one bit". There is no node `env`
      #   field in Archon (dag-node.ts:140), so the toggle lives in the command text the
      #   driver emits. ON arm = this exact command WITHOUT the prefix → real sanitized
      #   nudge; OFF arm = with the prefix → resolve_learnings writes the _BLIND_MARKER.
      # ----------------------------------------------------------------------------------
      #
      # AUTO_PILOT_REPO_ROOT / AUTO_PILOT_LEDGER_DIR / AUTO_PILOT_PYBIN / AUTO_PILOT_SCRIPTS
      # are supplied by the driver's ambient env (no Archon node `env` field exists). Pinned
      # defaults keep a manual single-run invocation working.
      PYBIN="${AUTO_PILOT_PYBIN:-python3}"
      SCRIPTS="${AUTO_PILOT_SCRIPTS:-$HOME/Documents/Project/auto-pilot/scripts}"
      STABLE_REPO_ROOT="${AUTO_PILOT_REPO_ROOT:-$PWD}"
      LEDGER_DIR="${AUTO_PILOT_LEDGER_DIR:?AUTO_PILOT_LEDGER_DIR must point at the durable ledger}"
      SCOPE="${AUTO_PILOT_SCOPE:-}"
      SCOPE_ARGS=()
      for s in $SCOPE; do SCOPE_ARGS+=(--scope "$s"); done
      "$PYBIN" "$SCRIPTS/orchestrator.py" resolve-learnings \
        --repo-root "$STABLE_REPO_ROOT" \
        --ledger-dir "$LEDGER_DIR" \
        --dest-dir "$ARTIFACTS_DIR" \
        --sanitized \
        "${SCOPE_ARGS[@]}"
      LM="$ARTIFACTS_DIR/context-bundle/learnings.md"
      test -f "$LM" || { echo "inject: $LM not written" >&2; exit 1; }
      BYTES=$(wc -c < "$LM" | tr -d ' ')
      echo "[$WORKFLOW_ID] inject: learnings.md ${BYTES} bytes (sanitized)" >&2
      printf '{"learnings_bytes": %s}\n' "$BYTES"
    timeout: 60000

  - id: review-claude
    provider: claude
    context: fresh
    allowed_tools: [Read]
    # output_type gates writeNodeArtifact (dag-executor.ts:3566): without it the
    # structured output is never persisted to nodes/review-claude.md, so capture-mine's
    # file read fails on every live run. With it + output_format, the file is bare JSON
    # (dag-executor.ts:1274-1287), directly loadable by archon_review_to_jsonl.py.
    output_type: review-json
    depends_on: [inject]
    prompt: |
      You are a strict, adversarial code reviewer. Be skeptical; default to REJECT when
      uncertain.

      First read BOTH of these files:

        $ARTIFACTS_DIR/diff.patch
        $ARTIFACTS_DIR/context-bundle/learnings.md

      The learnings file is a generic, class-level nudge from prior runs — it names defect
      CLASSES worth checking in this scope but contains NO specific issue, file, or line.
      Use it only as a checklist hint; do not assume any named class is actually present.

      Review ONLY the diff. Hunt for correctness bugs, security issues, broken edge cases,
      and silent failures. Do not praise. Report only real defects with a severity.

      For EVERY finding you MUST set:
        - severity: one of P0 / P1 / P2
        - title: a short defect title
        - detail: the evidence
        - file: the repo-relative path of the defective file (ALWAYS present)
        - class: the defect class if it matches one of the known reviewer-finding classes
                 (e.g. off-by-one, null-deref, index-out-of-bounds, race-condition,
                 injection, unchecked-return, resource-leak, ...). If no class applies,
                 set class to the exact string "none".

      APPROVE only if you found no P0/P1 defect. Set the `reviewer` field to exactly: claude
    output_format:
      type: object
      properties:
        reviewer: {type: string}
        verdict: {type: string, enum: [APPROVE, REJECT]}
        findings:
          type: array
          items:
            type: object
            properties:
              severity: {type: string, enum: [P0, P1, P2]}
              title: {type: string}
              detail: {type: string}
              file: {type: string}
              class: {type: string}
            required: [severity, title, detail, file, class]
      required: [reviewer, verdict, findings]

  - id: capture-mine
    depends_on: [review-claude]
    # trigger_rule: all_done so the mine node runs even when the reviewer verdict is REJECT
    # (a REJECT is the interesting case — those are exactly the findings we want to learn).
    trigger_rule: all_done
    bash: |
      set -euo pipefail
      # CAPTURE + MINE phase. Feeds the reviewer's REJECT findings back into the DURABLE
      # ledger so a later structurally-related diff inherits the memory.
      #
      # HELD-OUT SCORING GATE (codex P0-3): when the driver runs the A/B SCORING pass it
      # exports SCORING=1 on the Archon subprocess. The mine node then writes NOTHING — the
      # scored eval cases must not contaminate one another, and the driver asserts the
      # scoring ledger hash is unchanged across the scored set. Training/seeding runs leave
      # SCORING unset so the ledger accumulates.
      if [ "${SCORING:-0}" = "1" ]; then
        echo "[$WORKFLOW_ID] capture-mine: SCORING=1 — mine DISABLED (held-out scoring)" >&2
        printf '{"mined": false, "reason": "scoring"}\n'
        exit 0
      fi

      PYBIN="${AUTO_PILOT_PYBIN:-python3}"
      SCRIPTS="${AUTO_PILOT_SCRIPTS:-$HOME/Documents/Project/auto-pilot/scripts}"
      ARCHON_SCRIPTS="${AUTO_PILOT_ARCHON_SCRIPTS:-$(dirname "$0")}"
      STABLE_REPO_ROOT="${AUTO_PILOT_REPO_ROOT:-$PWD}"

      # 1) Stable run_id for the reviewed work unit (NEVER $WORKFLOW_ID).
      # shellcheck source=/dev/null
      . "$ARCHON_SCRIPTS/run_id_from_diff.sh" >/dev/null
      : "${RUN_ID:?run_id_from_diff.sh did not export RUN_ID}"
      export RUN_ID

      # 2) Write state.json {run_id} so the miner's non-dry-run gate is satisfied
      # (codex P0-2). The miner also accepts --run-id directly (Task 3); we pass both for
      # belt-and-suspenders so a stale state.json never silently dry-runs the miner.
      mkdir -p "$STABLE_REPO_ROOT/.planning/auto-pilot"
      printf '{"run_id": "%s"}\n' "$RUN_ID" > "$STABLE_REPO_ROOT/.planning/auto-pilot/state.json"

      # 3) Adapter: reviewer review.json → critic-rejections-phase-0.jsonl. The reviewer's
      # structured output text is persisted by Archon at nodes/<id>.md
      # (artifacts-index.ts:75). Read it as the review.json for the adapter.
      REVIEW_JSON="$ARTIFACTS_DIR/nodes/review-claude.md"
      test -f "$REVIEW_JSON" || { echo "capture-mine: $REVIEW_JSON missing" >&2; exit 1; }
      "$PYBIN" "$ARCHON_SCRIPTS/archon_review_to_jsonl.py" "$REVIEW_JSON" "$STABLE_REPO_ROOT"

      # 4) Mine: bump the DURABLE ledger. --run-id satisfies the gate without relying on the
      # state.json read path; the ledger lands at the per-repo-root home path resolved from
      # the stable --repo-root.
      "$PYBIN" "$SCRIPTS/learning_miner.py" \
        --repo-root "$STABLE_REPO_ROOT" \
        --run-id "$RUN_ID" \
        --json
      echo "[$WORKFLOW_ID] capture-mine: mined run_id=$RUN_ID" >&2
      printf '{"mined": true, "run_id": "%s"}\n' "$RUN_ID"
    timeout: 120000
